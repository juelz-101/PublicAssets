name: Deploy Multiple Vite Apps to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 1. Build the Main Hub App
      - name: Install dependencies (Hub)
        working-directory: Website/apps/hub
        run: npm install

      - name: Build Hub App
        working-directory: Website/apps/hub
        run: npm run build

      # 2. Build the QR Gem App
      - name: Install dependencies (QR Gem)
        working-directory: Website/public/apps/qr_gem
        run: npm install

      - name: Build QR Gem App
        working-directory: Website/public/apps/qr_gem
        run: npm run build

      # 3. Create the final unified publishing directory
      - name: Prepare Pages Artifact
        run: |
          # Create a temporary staging directory
          mkdir -p combined_dist
          
          # Move Hub into the expected sub-folder /PublicAssets/hub/
          mkdir -p combined_dist/hub
          cp -r Website/apps/hub/dist/* combined_dist/hub/
          
          # ======================================================================
          # AUTOMATION HACK: Inject the data folders into the built deployment paths
          # This saves us from having to modify the AI Studio source code!
          # ======================================================================
          cp -r Website/apps/hub/data combined_dist/hub/
          
          # (If QR Gem or future apps also have a data folder in their root, just copy it here too!)
          # cp -r Website/public/apps/qr_gem/data combined_dist/public/apps/qr_gem/
          # ======================================================================
          
          # Move QR Gem into its expected sub-folder /PublicAssets/public/apps/qr_gem/
          mkdir -p combined_dist/public/apps/qr_gem
          cp -r Website/public/apps/qr_gem/dist/* combined_dist/public/apps/qr_gem/
          
          # Copy the root redirect index.html into the publishing root directory
          cp index.html combined_dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined_dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4