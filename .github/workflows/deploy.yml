name: Deploy Multiple Vite Apps to GitHub Pages

on:
  push:
    branches: ["main"]   # or "master" depending on your default branch name

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Build the Main Hub App
      - name: Install dependencies (Hub)
        working-directory: Website/apps/hub
        run: npm ci

      - name: Build Hub App
        working-directory: Website/apps/hub
        run: npm run build

      # 2. Build the QR Gem App
      - name: Install dependencies (QR Gem)
        working-directory: Website/public/apps/qr_gem
        run: npm ci

      - name: Build QR Gem App
        working-directory: Website/public/apps/qr_gem
        run: npm run build

      # 3. Create the final unified publishing directory
      - name: Prepare Pages Artifact
        run: |
          # Create a temporary staging directory
          mkdir -p combined_dist
          
          # Option A: Move Hub into a sub-folder if you want it accessible at /PublicAssets/hub/
          mkdir -p combined_dist/hub
          cp -r Website/apps/hub/dist/* combined_dist/hub/
          
          # Move QR Gem into its expected sub-folder /PublicAssets/public/apps/qr_gem/
          mkdir -p combined_dist/public/apps/qr_gem
          cp -r Website/public/apps/qr_gem/dist/* combined_dist/public/apps/qr_gem/
          
          # Optional: Add a root redirect index.html
          cp index.html combined_dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined_dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4