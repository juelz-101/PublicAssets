<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #111827; /* Tailwind gray-900 */
            --primary-color: #f59e0b; /* Tailwind amber-500 */
            --text-color: #e5e7eb; /* Tailwind gray-200 */
            --border-color: rgba(255, 255, 255, 0.1);
            
            /* Glow Colors */
            --glow-color-primary: rgba(245, 158, 11, 0.2);
            --glow-color-dark-primary: rgba(180, 83, 9, 0.2);
            --glow-color-link: rgba(0, 0, 0, 0.5);
            --glow-color-bg: rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800"><defs><filter id="f" x="-50%" y="-50%" width="200%" height="200%"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter></defs><rect width="100%" height="100%" filter="url(%23f)" opacity="0.1"/></svg>');
            z-index: -1;
            pointer-events: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.5); /* amber-500/50 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(245, 158, 11, 0.8); /* amber-500/80 */
        }
        
        /* Glow on Hover Effect */
        .glow-on-hover {
            position: relative;
        }
        .glow-on-hover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                800px circle at var(--mouse-x) var(--mouse-y),
                var(--glow-color, var(--glow-color-primary)),
                transparent 40%
            );
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
        }
        .glow-on-hover:hover::before {
            opacity: 1;
        }

        /* Disable glow effect via body class */
        body.glow-disabled .glow-on-hover::before,
        body.glow-disabled .glow-on-hover:hover::before {
            opacity: 0 !important;
            background: none !important;
        }

        /* Custom classes to set the glow color */
        .glow-primary { --glow-color: var(--glow-color-primary); }
        .glow-dark-primary { --glow-color: var(--glow-color-dark-primary); }
        .glow-link { --glow-color: var(--glow-color-link); }
        .glow-bg { --glow-color: var(--glow-color-bg); }

        /* Custom Conveyor Scrollbar */
        .conveyor-scrollbar::-webkit-scrollbar {
            height: 8px;
        }
        .conveyor-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .conveyor-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.5); /* amber-500/50 */
            border-radius: 4px;
        }
        .conveyor-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(245, 158, 11, 0.8); /* amber-500/80 */
        }

        /* Custom Slider Styles */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            margin-top: -6px; /* Center thumb on track */
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
        }
        input[type="range"]:focus::-webkit-slider-thumb {
            outline: 2px solid rgba(251, 191, 36, 0.5);
            outline-offset: 2px;
        }
        
        /* Custom styles for react-syntax-highlighter */
        .code-block-wrapper pre {
            background-color: transparent !important;
            padding-top: 0.5rem !important;
            padding-bottom: 0.5rem !important;
            padding-right: 0.5rem !important;
            margin: 0 !important;
        }
        .code-block-wrapper code {
           font-family: 'Fira Code', 'Dank Mono', monospace;
           font-size: 0.875rem; /* text-sm */
        }
        .code-block-wrapper ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .code-block-wrapper ::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.4);
            border-radius: 3px;
        }
        .code-block-wrapper ::-webkit-scrollbar-thumb:hover {
            background: rgba(245, 158, 11, 0.7);
        }

        /* --- Global Typography Standards --- */
        .prose {
            color: #d1d5db; /* text-gray-300 */
        }
        .prose h1 {
            font-size: 2.25rem; /* text-4xl */
            font-weight: 800;
            color: var(--primary-color);
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            letter-spacing: -0.025em;
        }
        .prose h2 {
            font-size: 1.875rem; /* text-3xl */
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 1.75rem;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .prose h3 {
            font-size: 1.5rem; /* text-2xl */
            font-weight: 600;
            color: #fcd34d; /* amber-300 */
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        .prose h4 {
            font-size: 1.25rem; /* text-xl */
            font-weight: 600;
            color: #fef3c7; /* amber-100 */
            margin-top: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .prose p {
            margin-bottom: 1.25rem;
            line-height: 1.75;
        }
        .prose strong {
            color: #fef3c7; /* amber-100 */
            font-weight: 700;
        }
        .prose em {
            color: #d1d5db;
            font-style: italic;
        }
        
        /* Lists */
        .prose ul {
            list-style-type: disc;
            margin-top: 1.25rem;
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }
        .prose ol {
            list-style-type: decimal;
            margin-top: 1.25rem;
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }
        .prose li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }
        .prose li::marker {
            color: var(--primary-color);
            font-weight: 800;
        }

        /* Checkboxes / GFM Task Lists */
        .prose input[type="checkbox"] {
            margin-right: 0.5rem;
            accent-color: var(--primary-color);
            width: 1rem;
            height: 1rem;
            vertical-align: middle;
        }
        .prose .task-list-item {
            list-style-type: none;
            padding-left: 0;
        }

        /* --- Custom Markdown Styles --- */

        /* Custom HR for specific padding */
        .custom-hr {
            margin-top: 2rem;
            margin-bottom: 2rem;
            border-top: 1px solid var(--border-color);
        }

        /* Table Card Wrapper */
        .markdown-table-card {
            background-color: rgba(17, 24, 39, 0.5); /* bg-gray-900/50 */
            backdrop-filter: blur(8px);
            border-radius: var(--panel-radius, 16px);
            border: 1px solid var(--border-color, rgba(255, 255, 255, 0.1));
            overflow: hidden;
            margin: 1.5em 0;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .markdown-table-card table {
            width: 100%;
            font-size: 0.875rem;
            border-collapse: collapse;
        }

        .markdown-table-card th, 
        .markdown-table-card td {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--border-color, rgba(255, 255, 255, 0.1));
            text-align: left;
        }

        .markdown-table-card tr:last-child td {
            border-bottom: none;
        }

        .markdown-table-card thead {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .markdown-table-card th {
            color: var(--primary-color, #f59e0b);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            border-bottom-width: 2px;
        }

        /* Support for empty lines in Markdown */
        .prose p:empty {
            min-height: 1.5rem;
        }

        /* Custom Blockquote with decorative icon */
        .prose blockquote {
            position: relative;
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            background: rgba(245, 158, 11, 0.05);
            border-left: 4px solid var(--primary-color);
            border-radius: 0 12px 12px 0;
            font-style: italic;
            color: #e5e7eb;
        }
        .prose blockquote::before {
            content: '“';
            position: absolute;
            left: 0.5rem;
            top: -0.5rem;
            font-size: 4rem;
            line-height: 1;
            font-family: serif;
            color: var(--primary-color);
            opacity: 0.1;
            pointer-events: none;
        }

        /* Inline Code Contrast */
        .prose :not(pre) > code {
            color: #fcd34d; /* amber-300 */
            background-color: rgba(31, 41, 55, 0.8); /* gray-800/80 */
            padding: 0.2rem 0.4rem;
            border-radius: 0.375rem;
            font-size: 0.875em;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Images in Markdown */
        .prose img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 2rem auto;
            display: block;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
