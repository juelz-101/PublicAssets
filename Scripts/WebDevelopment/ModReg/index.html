<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Module Registry & Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root { /* Dark mode default */
        --color-background-base: #0A0A0A;
        --color-background-secondary: #1A1A1A;
        --color-background-tertiary: #2A2A2A;
        --color-text-primary: #EAEAEA;
        --color-text-secondary: #A9A9A9;
        --color-accent-primary: #08f7fe; /* neon-teal */
        --color-accent-secondary: #F50057; /* neon-pink */
        --color-accent-tertiary: #00ff9f; /* neon-green */
        --color-accent-error: #ff073a; /* neon-red */
        --color-glow: rgba(8, 247, 254, 0.5);
        --color-grid: color-mix(in srgb, var(--color-text-primary), transparent 90%);
        --color-horizon-sun: #08f7fe;
        --color-horizon-hills: #08f7fe;
        --color-stars: #EAEAEA;
        color-scheme: dark;
      }

      body {
        background-color: var(--color-background-base);
        color: var(--color-text-primary);
        overflow: hidden; /* Prevent scrollbars from animated background */
      }
      
      body.grid-background {
        background-image: 
          radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--color-accent-primary), transparent 90%), transparent 40%),
          linear-gradient(to right, var(--color-grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--color-grid) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        background-attachment: fixed;
      }

      /* Homepage specific background styles */
      .homepage-background {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }

      .grid-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      
      /* Markdown Styles */
      .markdown-body h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; color: var(--color-accent-primary); }
      .markdown-body h2 { font-size: 1.5em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; color: var(--color-text-primary); border-bottom: 1px solid var(--color-accent-primary); padding-bottom: 0.3em; }
      .markdown-body h3 { font-size: 1.25em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; color: var(--color-text-primary); }
      .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
      .markdown-body code { background-color: var(--color-background-tertiary); padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; }
      .markdown-body pre { background-color: var(--color-background-tertiary); padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; border: 1px solid var(--color-grid); }
      .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-body a { color: var(--color-accent-primary); text-decoration: none; }
      .markdown-body a:hover { text-decoration: underline; }
      .markdown-body blockquote { border-left: 4px solid var(--color-accent-secondary); padding-left: 1em; color: var(--color-text-secondary); margin-bottom: 1em; }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'base-100': 'var(--color-background-base)',
              'base-200': 'var(--color-background-secondary)',
              'base-300': 'var(--color-background-tertiary)',
              'text-primary': 'var(--color-text-primary)',
              'text-secondary': 'var(--color-text-secondary)',
              'neon-teal': 'var(--color-accent-primary)',
              'neon-pink': 'var(--color-accent-secondary)',
              'neon-green': 'var(--color-accent-tertiary)',
              'neon-red': 'var(--color-accent-error)',
              'neon-orange': '#FF7F50', /* Explicit for light theme accents if needed */
              'neon-blue': '#007BFF',   /* Explicit for light theme accents if needed */
            },
            boxShadow: {
              'glow-sm': '0 0 5px var(--color-glow)',
              'glow-md': '0 0 15px var(--color-glow)',
              'glow-lg': '0 0 30px var(--color-glow)',
            },
            animation: {
                'spin-slow': 'spin 3s linear infinite',
                'fade-in': 'fadeIn 0.3s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.19.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.1",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js",
    "firebase/": "https://aistudiocdn.com/firebase@^12.4.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
